<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Traders Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    color: #e8eaf0;
    font-family: 'Hind Siliguri', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }
  .container { max-width: 500px; width: 100%; }
  .logo {
    width: 80px; height: 80px;
    background: rgba(0,200,120,0.1);
    border: 2px solid rgba(0,200,120,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 36px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }
  h1 span { color: #00c878; }
  .subtitle {
    font-size: 15px;
    color: #8892a4;
    margin-bottom: 32px;
    line-height: 1.6;
  }
  .redirect-box {
    background: rgba(0,200,120,0.08);
    border: 1px solid rgba(0,200,120,0.2);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .redirect-text {
    font-size: 14px;
    color: #00c878;
    margin-bottom: 12px;
  }
  .countdown {
    font-size: 48px;
    font-weight: 700;
    color: #00c878;
    line-height: 1;
  }
  .countdown-label {
    font-size: 12px;
    color: #556070;
    margin-top: 4px;
  }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(0,200,120,0.1);
    border-radius: 2px;
    margin-top: 16px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #00c878;
    border-radius: 2px;
    width: 100%;
    animation: progress 3s linear forwards;
  }
  @keyframes progress {
    from { width: 100%; }
    to { width: 0%; }
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px;
    border-radius: 10px;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 17px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
    margin-bottom: 12px;
  }
  .btn-primary {
    background: #00c878;
    color: #031a10;
  }
  .btn-primary:hover {
    background: #00e88a;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,200,120,0.3);
  }
  .btn-secondary {
    background: transparent;
    color: #00c878;
    border: 2px solid rgba(0,200,120,0.4);
  }
  .btn-secondary:hover {
    background: rgba(0,200,120,0.1);
    transform: translateY(-2px);
  }
  .btn svg { width: 22px; height: 22px; flex-shrink: 0; }
  .divider {
    font-size: 12px;
    color: #3a4455;
    margin: 4px 0 16px;
  }
  .features {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 28px;
    flex-wrap: wrap;
  }
  .feature {
    font-size: 12px;
    color: #556070;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .feature::before {
    content: '✓';
    color: #00c878;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">📈</div>
  <h1>Elite Traders <span>Academy</span></h1>
  <p class="subtitle">ফ্রিতে Trading শিখুন। Daily signal, market analysis ও live session পাচ্ছেন সম্পূর্ণ বিনামূল্যে।</p>

  <div class="redirect-box">
    <p class="redirect-text">⚡ আপনাকে Telegram Channel এ নিয়ে যাওয়া হচ্ছে...</p>
    <div class="countdown" id="countdown">3</div>
    <div class="countdown-label">সেকেন্ড</div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <a class="btn btn-primary" href="https://t.me/+MLIOSoeFbD8zZWFl" target="_blank">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-1.97 9.289c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L6.374 14.41l-2.965-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.447 2.176z"/></svg>
    এখনই Channel এ Join করুন
  </a>

  <div class="divider">অথবা</div>

  <a class="btn btn-secondary" href="https://t.me/+fDALxrzp9bdiZGU1" target="_blank">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-1.97 9.289c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L6.374 14.41l-2.965-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.447 2.176z"/></svg>
    Discussion Group এ Join করুন
  </a>

  <div class="features">
    <span class="feature">Daily Signal</span>
    <span class="feature">Live Session</span>
    <span class="feature">সম্পূর্ণ ফ্রি</span>
    <span class="feature">Market Analysis</span>
  </div>
</div>

<script>
  // Auto redirect after 3 seconds
  var count = 3;
  var el = document.getElementById('countdown');
  var timer = setInterval(function() {
    count--;
    el.textContent = count;
    if (count <= 0) {
      clearInterval(timer);
      window.location.href = 'https://t.me/+MLIOSoeFbD8zZWFl';
    }
  }, 1000);
</script>
</body>
</html>
